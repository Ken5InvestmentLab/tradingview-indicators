<style>
  :root {
    --bg-dark: #050505;
    --bg-panel: rgba(20, 25, 40, 0.7);
    --primary: #00f3ff;
    --discord: #5865F2;
    --membership: #bd00ff;
    --text-main: #e5e7eb;
    --text-muted: #9ca3af;
    --font-head: 'Orbitron', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: var(--font-body);
    overflow-x: hidden;
    line-height: 1.8;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 200%; height: 200%;
    background-image:
      linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
    animation: gridMove 20s linear infinite;
    z-index: -2;
    pointer-events: none;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 90%);
    z-index: -1;
    pointer-events: none;
  }

  @keyframes gridMove {
    0%   { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
    100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
  }

  /* ── HEADER NAV ── */
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5, 5, 5, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 243, 255, 0.1);
    padding: 14px 20px;
  }

  .nav-inner {
    max-width: 860px;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: var(--font-head);
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: var(--primary);
    text-decoration: none;
    text-transform: uppercase;
  }

  .nav-back {
    font-family: var(--font-head);
    font-size: 0.75rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--primary); }

  /* ── ARTICLE CONTAINER ── */
  .article-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 100px;
    flex: 1;
    position: relative;
    z-index: 1;
  }

  /* ── ARTICLE HEADER ── */
  .article-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .article-tag {
    font-family: var(--font-head);
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary);
    border: 1px solid rgba(0, 243, 255, 0.3);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .article-date,
  .article-read {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .article-title {
    font-family: var(--font-head);
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #fff, var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.25;
    margin: 0 0 16px 0;
  }

  .article-lead {
    font-size: 1.15rem;
    color: var(--text-muted);
    border-left: 3px solid var(--primary);
    padding-left: 18px;
    margin: 0 0 48px 0;
    line-height: 1.7;
  }

  .article-divider {
    border: none;
    border-top: 1px solid rgba(0, 243, 255, 0.1);
    margin: 48px 0;
  }

  /* ── ARTICLE BODY ── */
  .article-body h2 {
    font-family: var(--font-head);
    font-size: 1.15rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--primary);
    border-left: 4px solid var(--membership);
    padding-left: 14px;
    margin: 48px 0 18px 0;
  }

  .article-body p {
    color: var(--text-muted);
    font-size: 1.05rem;
    line-height: 1.85;
    margin: 0 0 1.4rem 0;
    max-width: none;
    text-align: left;
  }

  .article-body strong {
    color: #fff;
    font-weight: 600;
  }

  .article-body ul,
  .article-body ol {
    color: var(--text-muted);
    font-size: 1.05rem;
    line-height: 1.85;
    padding-left: 1.6rem;
    margin: 0 0 1.4rem 0;
  }

  .article-body li { margin-bottom: 0.5rem; }

  .article-body a {
    color: var(--primary);
    text-decoration: none;
    border-bottom: 1px solid rgba(0, 243, 255, 0.3);
    transition: border-color 0.2s;
  }
  .article-body a:hover { border-color: var(--primary); }

  /* ── CTA BLOCK ── */
  .article-cta {
    background: var(--bg-panel);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 243, 255, 0.15);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    margin-top: 64px;
  }

  .article-cta p {
    color: var(--text-muted);
    font-size: 1.05rem;
    margin: 0 0 24px 0;
    text-align: center;
  }

  .cta-btn {
    display: inline-block;
    padding: 16px 36px;
    color: #fff;
    text-decoration: none;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid var(--discord);
    border-radius: 6px;
    background: linear-gradient(90deg, transparent, rgba(88,101,242,0.2), transparent);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 0; height: 100%;
    background: var(--discord);
    z-index: -1;
    transition: width 0.3s ease;
  }

  .cta-btn:hover {
    box-shadow: 0 0 30px rgba(88,101,242,0.5);
  }
  .cta-btn:hover::before { width: 100%; }

  /* ── BACK TO BLOG ── */
  .back-link {
    display: inline-block;
    margin-top: 48px;
    font-family: var(--font-head);
    font-size: 0.8rem;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--primary); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 30px 20px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .footer-logo {
    font-family: var(--font-head);
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .footer-contact a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: color 0.2s;
  }
  .footer-contact a:hover { color: var(--primary); }

  .copyright {
    font-size: 0.75rem;
    color: rgba(156,163,175,0.4);
    margin-top: 8px;
  }

  /* ── REVEAL ANIMATION ── */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.active { opacity: 1; transform: translateY(0); }
</style>
</head>

<script>
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); });
  }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
  reveals.forEach(el => observer.observe(el));
</script>
